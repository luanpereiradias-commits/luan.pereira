<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo do Foguete</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            border: 2px solid #333;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .info {
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="info">
        <h2>Foguete Defensor</h2>
        <p>Use as <b>Setas (Esquerda/Direita)</b> para mover e <b>Espaço</b> para atirar.</p>
        <p id="score">Pontos: 0</p>
    </div>

    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configurações do Jogo
        let score = 0;
        let gameOver = false;

        const player = {
            x: canvas.width / 2 - 15,
            y: canvas.height - 50,
            w: 30,
            h: 30,
            speed: 5,
            color: '#00f2ff'
        };

        const bullets = [];
        const enemies = [];
        const keys = {};

        // Controles
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        function spawnEnemy() {
            const size = 30;
            const x = Math.random() * (canvas.width - size);
            enemies.push({ x, y: -size, w: size, h: size, speed: 2 });
        }

        function update() {
            if (gameOver) return;

            // Movimento do Jogador
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

            // Atirar (Espaço)
            if (keys['Space']) {
                if (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 100) {
                    bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
                }
            }

            // Mover Tiros
            bullets.forEach((b, index) => {
                b.y -= 7;
                if (b.y < 0) bullets.splice(index, 1);
            });

            // Mover Inimigos
            enemies.forEach((en, index) => {
                en.y += en.speed;

                // Colisão Inimigo com Jogador
                if (en.x < player.x + player.w && en.x + en.w > player.x &&
                    en.y < player.y + player.h && en.y + en.h > player.y) {
                    gameOver = true;
                    alert("Fim de Jogo! Pontuação: " + score);
                    location.reload(); 
                }

                if (en.y > canvas.height) enemies.splice(index, 1);
            });

            // Colisão Tiro com Inimigo
            bullets.forEach((b, bIndex) => {
                enemies.forEach((en, enIndex) => {
                    if (b.x < en.x + en.w && b.x + b.w > en.x &&
                        b.y < en.y + en.h && b.y + b.h > en.y) {
                        enemies.splice(enIndex, 1);
                        bullets.splice(bIndex, 1);
                        score += 10;
                        scoreElement.innerText = "Pontos: " + score;
                    }
                });
            });

            // Gerar novos inimigos aleatoriamente
            if (Math.random() < 0.02) spawnEnemy();
        }

        function draw() {
            // Limpar tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Jogador (Triângulo/Foguete)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.w / 2, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.closePath();
            ctx.fill();

            // Desenhar Tiros
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Desenhar Inimigos (Quadrados vermelhos)
            ctx.fillStyle = '#ff4444';
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
