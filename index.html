<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Foguete e Laser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" class="game-over" style="display: none;">Game Over!</div>
    <div id="score" class="score">Pontuação: 0</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let rocketX = canvas.width / 2;
        let rocketY = canvas.height - 100;
        let rocketWidth = 50;
        let rocketHeight = 80;
        let rocketSpeed = 0;
        let rocketAccel = 0.1;  // Aceleração do foguete
        let maxSpeed = 5;  // Velocidade máxima do foguete
        let rotation = 0;  // Ângulo de rotação do foguete
        let lasers = [];
        let enemies = [];
        let score = 0;
        let gameOver = false;

        let moveLeft = false;
        let moveRight = false;
        let moveUp = false;

        // Carregar imagem do foguete
        const rocketImage = new Image();
        rocketImage.src = 'https://example.com/rocket.png'; // Substitua com a URL de uma imagem de foguete real

        // Som de disparo
        const laserSound = new Audio('https://example.com/laser_sound.mp3'); // Substitua com o caminho para o som de laser

        // Adicionar controle de teclas
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") moveLeft = true;
            if (e.key === "ArrowRight") moveRight = true;
            if (e.key === "ArrowUp") moveUp = true;
            if (e.key === " ") shootLaser();
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") moveLeft = false;
            if (e.key === "ArrowRight") moveRight = false;
            if (e.key === "ArrowUp") moveUp = false;
        });

        // Função para desenhar o foguete
        function drawRocket() {
            // Aplicar a rotação do foguete
            ctx.save();
            ctx.translate(rocketX + rocketWidth / 2, rocketY + rocketHeight / 2); // Posição do centro
            ctx.rotate(rotation); // Girar o foguete conforme a direção
            ctx.drawImage(rocketImage, -rocketWidth / 2, -rocketHeight / 2, rocketWidth, rocketHeight); // Desenhar o foguete
            ctx.restore();
        }

        // Função para desenhar o laser
        function drawLasers() {
            ctx.fillStyle = "red";
            lasers.forEach((laser, index) => {
                ctx.fillRect(laser.x, laser.y, 5, 20);
                laser.y -= 7;

                if (laser.y < 0) {
                    lasers.splice(index, 1);
                }
            });
        }

        // Função para atirar laser
        function shootLaser() {
            if (!gameOver) {
                lasers.push({
                    x: rocketX + rocketWidth / 2 - 2.5,
                    y: rocketY,
                });
                laserSound.play(); // Tocar som do laser
            }
        }

        // Função para desenhar inimigos
        function drawEnemies() {
            ctx.fillStyle = "green";
            enemies.forEach((enemy, index) => {
                ctx.fillRect(enemy.x, enemy.y, 40, 40);
                enemy.y += 2;

                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                }
            });
        }

        // Função para gerar inimigos aleatoriamente
        function spawnEnemies() {
            if (Math.random() < 0.02) {
                let x = Math.random() * (canvas.width - 40);
                enemies.push({ x, y: -40 });
            }
        }

        // Função para verificar colisões entre lasers e inimigos
        function checkCollisions() {
            lasers.forEach((laser, laserIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    if (laser.x < enemy.x + 40 &&
                        laser.x + 5 > enemy.x &&
                        laser.y < enemy.y + 40 &&
                        laser.y + 20 > enemy.y) {

                        lasers.splice(laserIndex, 1);
                        enemies.splice(enemyIndex, 1);
                        score += 10;
                        document.getElementById("score").textContent = `Pontuação: ${score}`;
                    }
                });
            });
        }

        // Função para atualizar o movimento do foguete
        function updateRocket() {
            if (moveLeft) rotation -= 0.05;
            if (moveRight) rotation += 0.05;

            if (moveUp && rocketSpeed < maxSpeed) {
                rocketSpeed += rocketAccel; // Acelera o foguete
            }

            rocketX += Math.sin(rotation) * rocketSpeed;
            rocketY -= Math.cos(rotation) * rocketSpeed;

            // Impedir que o foguete saia da tela
            if (rocketX < 0) rocketX = 0;
            if (rocketX + rocketWidth > canvas.width) rocketX = canvas.width - rocketWidth;
            if (rocketY < 0) rocketY = 0;
            if (rocketY + rocketHeight > canvas.height) rocketY = canvas.height - rocketHeight;
        }

        // Função para desenhar tudo no canvas
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) return;

            drawRocket();
            drawLasers();
            drawEnemies();
            updateRocket();
            spawnEnemies();
        }

        // Função para verificar colisões com o foguete (game over)
        function checkGameOver() {
            enemies.forEach((enemy) => {
                if (enemy.x < rocketX + rocketWidth &&
                    enemy.x + 40 > rocketX &&
                    enemy.y < rocketY + rocketHeight &&
                    enemy.y + 40 > rocketY) {
                    gameOver = true;
                    document.getElementById("gameOver").style.display = "block";
                }
            });
        }

        // Função para atualizar o jogo a cada frame
        function update() {
            if (gameOver) return;

            draw();
            checkCollisions();
            checkGameOver();
            requestAnimationFrame(update);
        }

        // Iniciar o jogo
        update();
    </script>
</body>
</html>
