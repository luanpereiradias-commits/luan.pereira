<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Foguete</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        canvas {
            border: 2px solid white;
        }

        .game-over {
            position: absolute;
            color: white;
            font-size: 50px;
            font-family: Arial, sans-serif;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="game-over" id="gameOverText" style="display: none;">Game Over</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const rocket = {
            x: canvas.width / 2,
            y: canvas.height - 60,
            width: 40,
            height: 60,
            speed: 5
        };

        const lasers = [];
        const enemies = [];
        let gameOver = false;

        // Função para desenhar o foguete
        function drawRocket() {
            ctx.fillStyle = "red";
            ctx.fillRect(rocket.x, rocket.y, rocket.width, rocket.height);
        }

        // Função para desenhar os lasers
        function drawLasers() {
            ctx.fillStyle = "cyan";
            lasers.forEach(laser => {
                ctx.fillRect(laser.x, laser.y, 5, 15);
            });
        }

        // Função para desenhar os inimigos
        function drawEnemies() {
            ctx.fillStyle = "green";
            enemies.forEach(enemy => {
                ctx.fillRect(enemy.x, enemy.y, 40, 40);
            });
        }

        // Função para atualizar o movimento dos lasers
        function updateLasers() {
            lasers.forEach((laser, index) => {
                laser.y -= 5; // Lasers se movem para cima
                if (laser.y < 0) {
                    lasers.splice(index, 1); // Remover lasers fora da tela
                }
            });
        }

        // Função para atualizar os inimigos
        function updateEnemies() {
            enemies.forEach(enemy => {
                enemy.y += enemy.speed;
                if (enemy.y > canvas.height) {
                    enemy.y = -40;
                    enemy.x = Math.random() * (canvas.width - 40);
                }
            });
        }

        // Função para detectar colisões
        function checkCollisions() {
            lasers.forEach((laser, laserIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    if (laser.x < enemy.x + 40 && laser.x + 5 > enemy.x &&
                        laser.y < enemy.y + 40 && laser.y + 15 > enemy.y) {
                        lasers.splice(laserIndex, 1);
                        enemies.splice(enemyIndex, 1);
                    }
                });
            });
        }

        // Função para criar inimigos
        function createEnemies() {
            if (Math.random() < 0.02) {
                const x = Math.random() * (canvas.width - 40);
                const y = -40;
                const speed = 2 + Math.random() * 2;
                enemies.push({ x, y, speed });
            }
        }

        // Função para desenhar o jogo
        function drawGame() {
            if (gameOver) {
                document.getElementById("gameOverText").style.display = "block";
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRocket();
            drawLasers();
            drawEnemies();

            updateLasers();
            updateEnemies();
            checkCollisions();
            createEnemies();

            requestAnimationFrame(drawGame); // Atualizar o jogo a cada frame
        }

        // Função para mover o foguete
        function moveRocket(event) {
            if (event.key === "ArrowLeft" && rocket.x > 0) {
                rocket.x -= rocket.speed;
            } else if (event.key === "ArrowRight" && rocket.x < canvas.width - rocket.width) {
                rocket.x += rocket.speed;
            } else if (event.key === "ArrowUp" && rocket.y > 0) {
                rocket.y -= rocket.speed;
            } else if (event.key === "ArrowDown" && rocket.y < canvas.height - rocket.height) {
                rocket.y += rocket.speed;
            }
        }

        // Função para atirar laser
        function shootLaser() {
            if (gameOver) return;
            lasers.push({ x: rocket.x + rocket.width / 2 - 2.5, y: rocket.y });
        }

        // Função para iniciar o jogo
        function startGame() {
            window.addEventListener("keydown", moveRocket);
            window.addEventListener("keydown", (e) => {
                if (e.key === " " || e.key === "Enter") shootLaser(); // Tiro com espaço ou Enter
            });
            drawGame();
        }

        startGame();
    </script>
</body>
</html>
