<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Foguete e Laser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" class="game-over" style="display: none;">Game Over!</div>

    <script>
        // Definir o tamanho do canvas
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Variáveis do jogo
        let rocketX = canvas.width / 2 - 25;
        let rocketY = canvas.height - 100;
        let rocketWidth = 50;
        let rocketHeight = 50;
        let rocketSpeed = 5;
        let laserSpeed = 7;
        let lasers = [];
        let gameOver = false;

        // Controle do movimento do foguete
        let moveLeft = false;
        let moveRight = false;

        // Adicionar controle de teclas
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") moveLeft = true;
            if (e.key === "ArrowRight") moveRight = true;
            if (e.key === " ") shootLaser();
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") moveLeft = false;
            if (e.key === "ArrowRight") moveRight = false;
        });

        // Função para desenhar o foguete
        function drawRocket() {
            ctx.fillStyle = "white";
            ctx.fillRect(rocketX, rocketY, rocketWidth, rocketHeight);
        }

        // Função para desenhar o laser
        function drawLasers() {
            ctx.fillStyle = "red";
            lasers.forEach((laser, index) => {
                ctx.fillRect(laser.x, laser.y, 5, 20);
                laser.y -= laserSpeed;

                // Remover lasers que saem da tela
                if (laser.y < 0) {
                    lasers.splice(index, 1);
                }
            });
        }

        // Função para atirar laser
        function shootLaser() {
            if (!gameOver) {
                lasers.push({
                    x: rocketX + rocketWidth / 2 - 2.5,
                    y: rocketY,
                });
            }
        }

        // Função para atualizar o movimento do foguete
        function updateRocket() {
            if (moveLeft && rocketX > 0) rocketX -= rocketSpeed;
            if (moveRight && rocketX < canvas.width - rocketWidth) rocketX += rocketSpeed;
        }

        // Função para desenhar tudo no canvas
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) return;

            drawRocket();
            drawLasers();
            updateRocket();
        }

        // Função para verificar colisões (apenas um exemplo básico, você pode expandir)
        function checkCollisions() {
            // Exemplo de uma colisão simples (usando a borda inferior da tela como "inimigo")
            if (rocketY + rocketHeight > canvas.height) {
                gameOver = true;
                document.getElementById("gameOver").style.display = "block";
            }
        }

        // Função para atualizar o jogo a cada frame
        function update() {
            if (gameOver) return;

            draw();
            checkCollisions();
            requestAnimationFrame(update);
        }

        // Iniciar o jogo
        update();
    </script>
</body>
</html>
