<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Foguete e Laser</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        .score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOver" class="game-over" style="display: none;">Game Over!</div>
    <div id="score" class="score">Pontuação: 0</div>

    <script>
        // Definir o tamanho do canvas
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Variáveis do jogo
        let rocketX = canvas.width / 2 - 25;
        let rocketY = canvas.height - 100;
        let rocketWidth = 50;
        let rocketHeight = 50;
        let rocketSpeed = 5;
        let laserSpeed = 7;
        let lasers = [];
        let enemies = [];
        let score = 0; // Pontuação
        let gameOver = false;

        // Controle do movimento do foguete
        let moveLeft = false;
        let moveRight = false;

        // Adicionar controle de teclas
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") moveLeft = true;
            if (e.key === "ArrowRight") moveRight = true;
            if (e.key === " ") shootLaser();
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") moveLeft = false;
            if (e.key === "ArrowRight") moveRight = false;
        });

        // Função para desenhar o foguete
        function drawRocket() {
            ctx.fillStyle = "white";
            ctx.fillRect(rocketX, rocketY, rocketWidth, rocketHeight);
        }

        // Função para desenhar o laser
        function drawLasers() {
            ctx.fillStyle = "red";
            lasers.forEach((laser, index) => {
                ctx.fillRect(laser.x, laser.y, 5, 20);
                laser.y -= laserSpeed;

                // Remover lasers que saem da tela
                if (laser.y < 0) {
                    lasers.splice(index, 1);
                }
            });
        }

        // Função para atirar laser
        function shootLaser() {
            if (!gameOver) {
                lasers.push({
                    x: rocketX + rocketWidth / 2 - 2.5,
                    y: rocketY,
                });
            }
        }

        // Função para desenhar inimigos
        function drawEnemies() {
            ctx.fillStyle = "green";
            enemies.forEach((enemy, index) => {
                ctx.fillRect(enemy.x, enemy.y, 40, 40);

                // Movimento dos inimigos
                enemy.y += 2;

                // Remover inimigos que saem da tela
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                }
            });
        }

        // Função para gerar inimigos aleatoriamente
        function spawnEnemies() {
            if (Math.random() < 0.02) {
                let x = Math.random() * (canvas.width - 40);
                enemies.push({ x, y: -40 });
            }
        }

        // Função para verificar colisões entre lasers e inimigos
        function checkCollisions() {
            lasers.forEach((laser, laserIndex) => {
                enemies.forEach((enemy, enemyIndex) => {
                    // Verificar colisão (simples: se o laser atinge a nave)
                    if (laser.x < enemy.x + 40 &&
                        laser.x + 5 > enemy.x &&
                        laser.y < enemy.y + 40 &&
                        laser.y + 20 > enemy.y) {

                        // Remover laser e inimigo quando há colisão
                        lasers.splice(laserIndex, 1);
                        enemies.splice(enemyIndex, 1);

                        // Aumentar a pontuação
                        score += 10;

                        // Atualizar a exibição da pontuação
                        document.getElementById("score").textContent = `Pontuação: ${score}`;
                    }
                });
            });
        }

        // Função para atualizar o movimento do foguete
        function updateRocket() {
            if (moveLeft && rocketX > 0) rocketX -= rocketSpeed;
            if (moveRight && rocketX < canvas.width - rocketWidth) rocketX += rocketSpeed;
        }

        // Função para desenhar tudo no canvas
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) return;

            drawRocket();
            drawLasers();
            drawEnemies();
            updateRocket();
            spawnEnemies();
        }

        // Função para verificar colisões com o foguete (game over)
        function checkGameOver() {
            // Verifica se algum inimigo colidiu com o foguete
            enemies.forEach((enemy) => {
                if (enemy.x < rocketX + rocketWidth &&
                    enemy.x + 40 > rocketX &&
                    enemy.y < rocketY + rocketHeight &&
                    enemy.y + 40 > rocketY) {
                    gameOver = true;
                    document.getElementById("gameOver").style.display = "block";
                }
            });
        }

        // Função para atualizar o jogo a cada frame
        function update() {
            if (gameOver) return;

            draw();
            checkCollisions();
            checkGameOver();
            requestAnimationFrame(update);
        }

        // Iniciar o jogo
        update();
    </script>
</body>
</html>
