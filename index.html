












<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter Pro</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            font-size: 20px; pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        #gameOver {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; text-align: center; display: none;
            background: rgba(0, 0, 0, 0.9); padding: 40px; border: 2px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc; border-radius: 8px;
        }
        button {
            margin-top: 20px; padding: 12px 30px; cursor: pointer;
            background: #00ffcc; border: none; font-weight: bold; color: #000;
            transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="ui">
        Score: <span id="scoreVal">0</span><br>
        Vidas: <span id="livesVal">3</span>
    </div>

    <div id="gameOver">
        <h1>MISSSÃO FALHOU</h1>
        <p>Pontuação Total: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Reiniciar Sistema</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("scoreVal");
        const livesEl = document.getElementById("livesVal");

        let score, lives, gameActive, enemies, lasers, particles, player;
        const keys = {};

        // --- Classes do Jogo ---

        class Player {
            constructor() {
                this.w = 50;
                this.h = 50;
                this.x = canvas.width / 2 - this.w / 2;
                this.y = canvas.height - 80;
                this.speed = 10;
            }
            draw() {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00ffcc";
                ctx.fillStyle = "#00ffcc";
                // Desenha uma nave triangular estilizada
                ctx.beginPath();
                ctx.moveTo(this.x + this.w / 2, this.y);
                ctx.lineTo(this.x, this.y + this.h);
                ctx.lineTo(this.x + this.w, this.y + this.h);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            update() {
                if (keys["ArrowLeft"] && this.x > 0) this.x -= this.speed;
                if (keys["ArrowRight"] && this.x < canvas.width - this.w) this.x += this.speed;
            }
        }

        class Laser {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.w = 4;
                this.h = 15;
                this.speed = 12;
            }
            draw() {
                ctx.fillStyle = "#ff0055";
                ctx.fillRect(this.x, this.y, this.w, this.h);
            }
            update() { this.y -= this.speed; }
        }

        class Enemy {
            constructor() {
                this.w = 40;
                this.h = 40;
                this.x = Math.random() * (canvas.width - this.w);
                this.y = -this.h;
                this.speed = 2 + (score / 200); // Dificuldade progressiva
            }
            draw() {
                ctx.fillStyle = "#ffcc00";
                ctx.fillRect(this.x, this.y, this.w, this.h);
                // Detalhe "olho" do inimigo
                ctx.fillStyle = "#000";
                ctx.fillRect(this.x + 10, this.y + 10, 20, 5);
            }
            update() { this.y += this.speed; }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.alpha = 1;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= 0.02;
            }
        }

        // --- Lógica Principal ---

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            score = 0;
            lives = 3;
            gameActive = true;
            enemies = [];
            lasers = [];
            particles = [];
            player = new Player();
            document.getElementById("gameOver").style.display = "none";
            updateUI();
        }

        function spawnExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function updateUI() {
            scoreEl.innerText = score;
            livesEl.innerText = lives;
        }

        function gameLoop() {
            if (!gameActive) return;

            // Limpa com rastro leve
            ctx.fillStyle = "rgba(10, 10, 10, 0.2)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            player.update();
            player.draw();

            // Gerenciar Lasers
            lasers.forEach((l, index) => {
                l.update();
                l.draw();
                if (l.y + l.h < 0) lasers.splice(index, 1);
            });

            // Gerenciar Inimigos
            if (Math.random() < 0.03) enemies.push(new Enemy());
            enemies.forEach((en, eIndex) => {
                en.update();
                en.draw();

                // Colisão Inimigo vs Player
                if (en.x < player.x + player.w && en.x + en.w > player.x && 
                    en.y < player.y + player.h && en.y + en.h > player.y) {
                    handleHit(eIndex);
                }

                // Inimigo passou da tela
                if (en.y > canvas.height) {
                    enemies.splice(eIndex, 1);
                    lives--;
                    updateUI();
                }

                // Colisão Inimigo vs Laser
                lasers.forEach((l, lIndex) => {
                    if (l.x < en.x + en.w && l.x + l.w > en.x && l.y < en.y + en.h && l.y + l.h > en.y) {
                        spawnExplosion(en.x + en.w/2, en.y + en.h/2, "#ffcc00");
                        enemies.splice(eIndex, 1);
                        lasers.splice(lIndex, 1);
                        score += 10;
                        updateUI();
                    }
                });
            });

            // Gerenciar Partículas
            particles.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.alpha <= 0) particles.splice(index, 1);
            });

            if (lives <= 0) endGame();

            requestAnimationFrame(gameLoop);
        }

        function handleHit(index) {
            spawnExplosion(player.x + player.w/2, player.y + player.h/2, "#00ffcc");
            enemies.splice(index, 1);
            lives--;
            updateUI();
        }

        function endGame() {
            gameActive = false;
            document.getElementById("gameOver").style.display = "block";
            document.getElementById("finalScore").innerText = score;
        }

        function resetGame() {
            init();
            gameLoop();
        }

        // --- Eventos ---
        window.addEventListener("keydown", e => {
            keys[e.key] = true;
            if (e.key === " " && gameActive) {
                lasers.push(new Laser(player.x + player.w / 2 - 2, player.y));
            }
        });
        window.addEventListener("keyup", e => keys[e.key] = false);
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        init();
        gameLoop();
    </script>
</body>
</html></html>>
