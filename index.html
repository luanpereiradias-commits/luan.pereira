
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foguete Defensor Pro - Ultra</title>
    <style>
        :root { --neon: #00f2ff; --danger: #ff4444; }
        body {
            margin: 0; background: #020205; color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; overflow: hidden;
            touch-action: none;
        }
        .ui { text-align: center; margin-bottom: 10px; z-index: 10; }
        #score { font-size: 2.5rem; font-weight: bold; color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        canvas {
            border: 3px solid #1a1a2e; background: #000;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            border-radius: 12px; cursor: crosshair;
        }
        .controls-hint { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="ui">
        <div id="score">0000</div>
        <div class="controls-hint">Mova o Mouse/Dedo • Clique para Atirar</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configurações Dinâmicas
        const setCanvasSize = () => {
            canvas.width = Math.min(window.innerWidth * 0.9, 450);
            canvas.height = Math.min(window.innerHeight * 0.7, 700);
        };
        setCanvasSize();

        let score = 0;
        let gameOver = false;
        let frameCount = 0;
        const keys = {};
        const state = { bullets: [], enemies: [], particles: [], stars: [] };

        // Inicializar estrelas de fundo
        for(let i=0; i<50; i++) {
            state.stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2 });
        }

        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            w: 34, h: 40,
            color: '#00f2ff',
            targetX: canvas.width / 2
        };

        // Inputs
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.clientX - rect.left;
        });
        canvas.addEventListener('touchmove', e => {
            const rect = canvas.getBoundingClientRect();
            player.targetX = e.touches[0].clientX - rect.left;
        }, {passive: false});
        
        let isShooting = false;
        const startShoot = () => isShooting = true;
        const stopShoot = () => isShooting = false;
        window.addEventListener('mousedown', startShoot);
        window.addEventListener('mouseup', stopShoot);
        window.addEventListener('touchstart', startShoot);
        window.addEventListener('touchend', stopShoot);

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                state.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color
                });
            }
        }

        function update() {
            if (gameOver) return;

            // Suavização do movimento (Lerp)
            player.x += (player.targetX - player.w/2 - player.x) * 0.2;
            
            // Background Parallax
            state.stars.forEach(s => {
                s.y += s.s * 0.5;
                if(s.y > canvas.height) s.y = 0;
            });

            // Atirar
            if (isShooting && frameCount % 8 === 0) {
                state.bullets.push({ x: player.x + player.w/2 - 2, y: player.y, w: 4, h: 12 });
            }

            // Update Balas
            state.bullets.forEach((b, i) => {
                b.y -= 12;
                if (b.y < 0) state.bullets.splice(i, 1);
            });

            // Spawner progressivo
            if (frameCount % Math.max(10, (50 - Math.floor(score/100))) === 0) {
                const size = 20 + Math.random() * 30;
                state.enemies.push({
                    x: Math.random() * (canvas.width - size),
                    y: -size, w: size, h: size,
                    speed: 2 + (score / 1000),
                    rot: 0,
                    rotV: (Math.random() - 0.5) * 0.1
                });
            }

            // Update Inimigos
            state.enemies.forEach((en, i) => {
                en.y += en.speed;
                en.rot += en.rotV;

                // Colisão Jogador
                if (en.x < player.x + player.w && en.x + en.w > player.x &&
                    en.y < player.y + player.h && en.y + en.h > player.y) {
                    gameOver = true;
                    createExplosion(player.x + player.w/2, player.y + player.h/2, '#00f2ff');
                }

                // Colisão Balas
                state.bullets.forEach((b, bi) => {
                    if (b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                        createExplosion(en.x + en.w/2, en.y + en.h/2, '#ff4444');
                        state.enemies.splice(i, 1);
                        state.bullets.splice(bi, 1);
                        score += 10;
                        scoreElement.innerText = score.toString().padStart(4, '0');
                    }
                });

                if (en.y > canvas.height) state.enemies.splice(i, 1);
            });

            // Update Partículas
            state.particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                if (p.life <= 0) state.particles.splice(i, 1);
            });

            frameCount++;
        }

        function draw() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrelas
            ctx.fillStyle = '#fff';
            state.stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

            // Partículas
            state.particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;

            // Jogador (Nave Neon)
            ctx.shadowBlur = 15; ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x + player.w/2, player.y);
            ctx.lineTo(player.x, player.y + player.h);
            ctx.lineTo(player.x + player.w, player.y + player.h);
            ctx.fill();
            
            // Propulsor
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x + player.w/2 - 4, player.y + player.h, 8, Math.random()*10);

            // Balas
            ctx.shadowColor = '#fff';
            state.bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

            // Inimigos (Asteroides)
            ctx.shadowBlur = 0;
            state.enemies.forEach(en => {
                ctx.save();
                ctx.translate(en.x + en.w/2, en.y + en.h/2);
                ctx.rotate(en.rot);
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 2;
                ctx.strokeRect(-en.w/2, -en.h/2, en.w, en.h);
                ctx.restore();
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.font = 'bold 40px Arial';
                ctx.fillText('FIM DE JOGO', canvas.width/2, canvas.height/2);
                ctx.font = '20px Arial';
                ctx.fillText('Toque para Reiniciar', canvas.width/2, canvas.height/2 + 50);
                canvas.onclick = () => location.reload();
            } else {
                requestAnimationFrame(() => { update(); draw(); });
            }
        }

        draw();
    </script>
</body>
</html>
