<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carro 3D no Jogo</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    // Cena e câmera
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0a0a0);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7.5);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    // Chão
    const floorGeometry = new THREE.PlaneGeometry(50, 50);
    const floorMaterial = new THREE.MeshStandardMaterial({color: 0x228B22});
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Carro 3D
    let car;
    const loader = new THREE.GLTFLoader();
    loader.load('car.glb', function(gltf){
        car = gltf.scene;
        car.scale.set(0.5, 0.5, 0.5); // ajusta o tamanho do carro
        car.position.y = 0.25;
        scene.add(car);
    }, undefined, function(error){
        console.error(error);
    });

    // Controles simples do carro
    const speed = 0.1;
    const turnSpeed = 0.05;
    let moveForward = false;
    let moveBackward = false;
    let turnLeft = false;
    let turnRight = false;

    document.addEventListener('keydown', (event) => {
        if(event.key === 'ArrowUp') moveForward = true;
        if(event.key === 'ArrowDown') moveBackward = true;
        if(event.key === 'ArrowLeft') turnLeft = true;
        if(event.key === 'ArrowRight') turnRight = true;
    });

    document.addEventListener('keyup', (event) => {
        if(event.key === 'ArrowUp') moveForward = false;
        if(event.key === 'ArrowDown') moveBackward = false;
        if(event.key === 'ArrowLeft') turnLeft = false;
        if(event.key === 'ArrowRight') turnRight = false;
    });

    // Loop de animação
    function animate(){
        requestAnimationFrame(animate);

        if(car){
            if(moveForward){
                car.position.x -= Math.sin(car.rotation.y) * speed;
                car.position.z -= Math.cos(car.rotation.y) * speed;
            }
            if(moveBackward){
                car.position.x += Math.sin(car.rotation.y) * speed;
                car.position.z += Math.cos(car.rotation.y) * speed;
            }
            if(turnLeft) car.rotation.y += turnSpeed;
            if(turnRight) car.rotation.y -= turnSpeed;

            // Câmera segue o carro
            camera.position.x = car.position.x + 5 * Math.sin(car.rotation.y);
            camera.position.z = car.position.z + 5 * Math.cos(car.rotation.y);
            camera.position.y = car.position.y + 3;
            camera.lookAt(car.position);
        }

        renderer.render(scene, camera);
    }

    animate();

    // Ajuste automático do tamanho da tela
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
