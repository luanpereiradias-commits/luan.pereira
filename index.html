
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Carro 3D Melhorado</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
    <script>
        // Cena, câmera e renderizador
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Luzes
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        // Chão
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({color: 0x228B22});
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Carro (cubo + rodas)
        const car = new THREE.Group();

        // Corpo
        const bodyGeometry = new THREE.BoxGeometry(1.5, 0.5, 3);
        const bodyMaterial = new THREE.MeshStandardMaterial({color: 0xff0000});
        const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
        body.position.y = 0.5;
        car.add(body);

        // Rodas
        const wheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
        const wheelMaterial = new THREE.MeshStandardMaterial({color: 0x333333});

        function createWheel(x, z) {
            const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(x, 0.3, z);
            car.add(wheel);
        }

        createWheel(-0.7, -1.2);
        createWheel(0.7, -1.2);
        createWheel(-0.7, 1.2);
        createWheel(0.7, 1.2);

        car.position.y = 0;
        scene.add(car);

        // Controle do carro
        const speed = 0.2;
        const turnSpeed = 0.03;
        let moveForward = false;
        let moveBackward = false;
        let turnLeft = false;
        let turnRight = false;

        document.addEventListener('keydown', (event) => {
            if(event.key === 'ArrowUp' || event.key === 'w') moveForward = true;
            if(event.key === 'ArrowDown' || event.key === 's') moveBackward = true;
            if(event.key === 'ArrowLeft' || event.key === 'a') turnLeft = true;
            if(event.key === 'ArrowRight' || event.key === 'd') turnRight = true;
        });

        document.addEventListener('keyup', (event) => {
            if(event.key === 'ArrowUp' || event.key === 'w') moveForward = false;
            if(event.key === 'ArrowDown' || event.key === 's') moveBackward = false;
            if(event.key === 'ArrowLeft' || event.key === 'a') turnLeft = false;
            if(event.key === 'ArrowRight' || event.key === 'd') turnRight = false;
        });

        // Loop de animação
        function animate() {
            requestAnimationFrame(animate);

            // Movimento do carro usando translateZ
            if(moveForward) car.translateZ(-speed);
            if(moveBackward) car.translateZ(speed);
            if(turnLeft) car.rotation.y += turnSpeed;
            if(turnRight) car.rotation.y -= turnSpeed;

            // Câmera segue o carro suavemente
            const cameraOffset = new THREE.Vector3(0, 3, 7);
            const desiredPosition = car.position.clone().add(
                new THREE.Vector3(
                    cameraOffset.x * Math.sin(car.rotation.y),
                    cameraOffset.y,
                    cameraOffset.z * Math.cos(car.rotation.y)
                )
            );

            camera.position.lerp(desiredPosition, 0.1);
            camera.lookAt(car.position);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>












<script>
    // Dentro da função animate()
    function animate() {
        requestAnimationFrame(animate);

        // Movimento do carro
        if(moveForward) car.translateZ(-speed);
        if(moveBackward) car.translateZ(speed);
        if(turnLeft) car.rotation.y += turnSpeed;
        if(turnRight) car.rotation.y -= turnSpeed;

        // Câmera melhorada
        const cameraDistance = 7; // distância atrás do carro
        const cameraHeight = 3;   // altura da câmera
        const cameraLerpFactor = 0.1; // suavidade

        // Calcula posição desejada da câmera atrás do carro
        const behind = new THREE.Vector3(0, 0, cameraDistance);
        behind.applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y); // rotaciona com o carro
        const desiredCameraPos = car.position.clone().add(new THREE.Vector3(0, cameraHeight, 0)).add(behind);

        // Suaviza movimento da câmera
        camera.position.lerp(desiredCameraPos, cameraLerpFactor);

        // Ajusta a rotação da câmera suavemente para olhar para o carro
        const lookAtPos = car.position.clone().add(new THREE.Vector3(0, 1, 0)); // olhar ligeiramente acima
        camera.lookAt(lookAtPos);

        renderer.render(scene, camera);
    }
</script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Carro 3D com Turbo Visual</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0a0a0);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    // Grama
    const grassGeometry = new THREE.PlaneGeometry(100, 100);
    const grassMaterial = new THREE.MeshStandardMaterial({color: 0x228B22});
    const grass = new THREE.Mesh(grassGeometry, grassMaterial);
    grass.rotation.x = -Math.PI / 2;
    scene.add(grass);

    // Rua
    const streetGeometry = new THREE.PlaneGeometry(6, 50);
    const streetMaterial = new THREE.MeshStandardMaterial({color: 0x333333});
    const street = new THREE.Mesh(streetGeometry, streetMaterial);
    street.rotation.x = -Math.PI / 2;
    street.position.z = 0;
    scene.add(street);

    const lineGeometry = new THREE.PlaneGeometry(0.2, 50);
    const lineMaterial = new THREE.MeshStandardMaterial({color: 0xffff00});
    const line = new THREE.Mesh(lineGeometry, lineMaterial);
    line.rotation.x = -Math.PI / 2;
    line.position.y = 0.01;
    scene.add(line);

    // Carro
    const car = new THREE.Group();
    const bodyGeometry = new THREE.BoxGeometry(1.5, 0.5, 3);
    const bodyMaterial = new THREE.MeshStandardMaterial({color: 0xff0000});
    const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
    body.position.y = 0.5;
    car.add(body);

    const wheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
    const wheelMaterial = new THREE.MeshStandardMaterial({color: 0x333333});
    function createWheel(x, z) {
        const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(x, 0.3, z);
        car.add(wheel);
    }
    createWheel(-0.7, -1.2);
    createWheel(0.7, -1.2);
    createWheel(-0.7, 1.2);
    createWheel(0.7, 1.2);

    car.position.set(0, 0, -20);
    scene.add(car);

    // Turbo visual: cones atrás do carro
    const turboGroup = new THREE.Group();
    const coneGeometry = new THREE.ConeGeometry(0.2, 0.8, 8);
    const coneMaterial = new THREE.MeshStandardMaterial({color: 0xff6600, emissive: 0xff3300});
    const coneLeft = new THREE.Mesh(coneGeometry, coneMaterial);
    const coneRight = new THREE.Mesh(coneGeometry, coneMaterial);

    coneLeft.rotation.x = Math.PI;
    coneRight.rotation.x = Math.PI;

    coneLeft.position.set(-0.5, 0.4, 1.6);
    coneRight.position.set(0.5, 0.4, 1.6);

    turboGroup.add(coneLeft);
    turboGroup.add(coneRight);
    car.add(turboGroup);

    turboGroup.visible = false; // inicialmente invisível

    // Controle
    let moveForward = false, moveBackward = false, turnLeft = false, turnRight = false, turbo = false;
    const baseSpeed = 0.2;
    const turboMultiplier = 2;
    const turnSpeed = 0.03;

    document.addEventListener('keydown', (event) => {
        if(event.key === 'ArrowUp' || event.key === 'w') moveForward = true;
        if(event.key === 'ArrowDown' || event.key === 's') moveBackward = true;
        if(event.key === 'ArrowLeft' || event.key === 'a') turnLeft = true;
        if(event.key === 'ArrowRight' || event.key === 'd') turnRight = true;
        if(event.key === 'Shift') turbo = true;
    });

    document.addEventListener('keyup', (event) => {
        if(event.key === 'ArrowUp' || event.key === 'w') moveForward = false;
        if(event.key === 'ArrowDown' || event.key === 's') moveBackward = false;
        if(event.key === 'ArrowLeft' || event.key === 'a') turnLeft = false;
        if(event.key === 'ArrowRight' || event.key === 'd') turnRight = false;
        if(event.key === 'Shift') turbo = false;
    });

    // Loop de animação
    function animate() {
        requestAnimationFrame(animate);

        const currentSpeed = turbo ? baseSpeed * turboMultiplier : baseSpeed;

        if(moveForward) car.translateZ(-currentSpeed);
        if(moveBackward) car.translateZ(currentSpeed);
        if(turnLeft) car.rotation.y += turnSpeed;
        if(turnRight) car.rotation.y -= turnSpeed;

        // Turbo visual
        turboGroup.visible = turbo;
        body.material.color.set(turbo ? 0xffff00 : 0xff0000);

        // Câmera atrás do carro
        const cameraDistance = 7;
        const cameraHeight = 3;
        const cameraLerpFactor = 0.1;

        const behind = new THREE.Vector3(0, 0, cameraDistance);
        behind.applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y);
        const desiredCameraPos = car.position.clone().add(new THREE.Vector3(0, cameraHeight, 0)).add(behind);

        camera.position.lerp(desiredCameraPos, cameraLerpFactor);
        camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 1, 0)));

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
